  <circle cx="600" cy="1014" r="6" fill="#0d0c0a" stroke="#e88a4e" stroke-width="1.6"/>
  <circle cx="600" cy="1014" r="1.5" fill="#e88a4e"/>
  <text x="618" y="1018" class="mono" font-size="12" fill="#efe9d8">Caller · spotlit incident edges</text>

  <line x1="1080" y1="1014" x2="1124" y2="1014" stroke="rgba(239,233,216,0.26)" stroke-width="1"/>
