    <line x1="960"  y1="380"  x2="1140" y2="430"/>
    <line x1="960"  y1="380"  x2="704"  y2="600"/>
    <line x1="960"  y1="380"  x2="1216" y2="600"/>
    <line x1="780"  y1="430"  x2="1140" y2="430"/>
