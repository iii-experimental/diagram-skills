<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <style><![CDATA[
      .mono { font-family: 'JetBrains Mono', Menlo, ui-monospace, monospace; }
      .sans { font-family: 'Inter Tight', system-ui, sans-serif; }
    ]]></style>

    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0c0b0a"/>
    </marker>
    <marker id="arrow-acc" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d9763a"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="#f2ede1"/>

  <!-- HEADER -->
  <text x="80" y="100" class="mono" font-size="12" letter-spacing="3.5" fill="rgba(12,11,10,0.50)">
    STATE MACHINE · SANDBOX LIFECYCLE · iii
  </text>
  <text x="80" y="180" class="sans" font-size="64" font-weight="500" letter-spacing="-1.5" fill="#0c0b0a">
    Sandbox states · created → running → expired
  </text>
  <text x="80" y="220" class="mono" font-size="14" letter-spacing="0.5" fill="rgba(12,11,10,0.50)">
    7 states · 9 transitions · cron-driven expiry · resume from snapshot
  </text>

  <!-- ARROWS first -->
  <g>
    <!-- start → created -->
    <line x1="156" y1="540" x2="216" y2="540" stroke="#0c0b0a" stroke-width="1.4" marker-end="url(#arrow)"/>
    <!-- created → running (primary) -->
    <line x1="436" y1="540" x2="556" y2="540" stroke="#d9763a" stroke-width="1.6" marker-end="url(#arrow-acc)"/>
    <!-- running → paused -->
    <line x1="844" y1="500" x2="964" y2="420" stroke="#0c0b0a" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- paused → running (resume) -->
    <line x1="964" y1="460" x2="844" y2="540" stroke="#0c0b0a" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <!-- running → expired -->
    <line x1="844" y1="580" x2="964" y2="660" stroke="#0c0b0a" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- expired → snapshotted -->
    <line x1="1192" y1="700" x2="1312" y2="700" stroke="#0c0b0a" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- snapshotted → resumed (loop back) -->
    <path d="M 1432 660 Q 1432 380 700 380 Q 700 480 700 500" fill="none" stroke="#0c0b0a" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <!-- running → killed -->
    <line x1="700" y1="600" x2="700" y2="800" stroke="#0c0b0a" stroke-width="1.2" marker-end="url(#arrow)"/>
    <!-- killed → terminal -->
    <line x1="844" y1="840" x2="900" y2="840" stroke="#0c0b0a" stroke-width="1.4" marker-end="url(#arrow)"/>
  </g>

  <!-- start dot -->
  <circle cx="156" cy="540" r="8" fill="#0c0b0a"/>

  <!-- created -->
  <rect x="216" y="500" width="220" height="80" rx="8" fill="#f2ede1"/>
  <rect x="216" y="500" width="220" height="80" rx="8" fill="#ffffff" stroke="#0c0b0a" stroke-width="1"/>
  <rect x="228" y="512" width="56" height="16" rx="2" fill="transparent" stroke="rgba(12,11,10,0.50)" stroke-width="0.8"/>
  <text x="256" y="523" class="mono" font-size="9" letter-spacing="1.2" fill="rgba(12,11,10,0.50)" text-anchor="middle">STATE</text>
  <text x="326" y="558" class="sans" font-size="20" font-weight="600" fill="#0c0b0a" text-anchor="middle">created</text>

  <!-- running (FOCAL) -->
  <text x="824" y="600" class="sans" font-size="120" font-weight="700"
        fill="rgba(217,118,58,0.10)" text-anchor="end" letter-spacing="-4">02</text>
  <rect x="556" y="480" width="288" height="120" rx="8" fill="#f2ede1"/>
  <rect x="556" y="480" width="288" height="120" rx="8" fill="rgba(217,118,58,0.10)" stroke="#d9763a" stroke-width="1.6"/>
  <rect x="568" y="492" width="56" height="16" rx="2" fill="transparent" stroke="#d9763a" stroke-width="0.9"/>
  <text x="596" y="503" class="mono" font-size="9" letter-spacing="1.2" fill="#d9763a" text-anchor="middle">FOCAL</text>
  <text x="700" y="548" class="sans" font-size="22" font-weight="700" fill="#0c0b0a" text-anchor="middle">running</text>
  <text x="700" y="576" class="mono" font-size="12" fill="rgba(12,11,10,0.74)" text-anchor="middle">microvm · ttl active</text>

  <!-- paused -->
  <rect x="964" y="380" width="220" height="80" rx="8" fill="#f2ede1"/>
  <rect x="964" y="380" width="220" height="80" rx="8" fill="#ffffff" stroke="#0c0b0a" stroke-width="1"/>
  <rect x="976" y="392" width="56" height="16" rx="2" fill="transparent" stroke="rgba(12,11,10,0.50)" stroke-width="0.8"/>
  <text x="1004" y="403" class="mono" font-size="9" letter-spacing="1.2" fill="rgba(12,11,10,0.50)" text-anchor="middle">STATE</text>
  <text x="1074" y="438" class="sans" font-size="20" font-weight="600" fill="#0c0b0a" text-anchor="middle">paused</text>

  <!-- expired -->
  <rect x="964" y="660" width="228" height="80" rx="8" fill="#f2ede1"/>
  <rect x="964" y="660" width="228" height="80" rx="8" fill="#ffffff" stroke="#0c0b0a" stroke-width="1"/>
  <rect x="976" y="672" width="56" height="16" rx="2" fill="transparent" stroke="rgba(12,11,10,0.50)" stroke-width="0.8"/>
  <text x="1004" y="683" class="mono" font-size="9" letter-spacing="1.2" fill="rgba(12,11,10,0.50)" text-anchor="middle">STATE</text>
  <text x="1078" y="718" class="sans" font-size="20" font-weight="600" fill="#0c0b0a" text-anchor="middle">expired</text>

  <!-- snapshotted -->
  <rect x="1312" y="660" width="240" height="80" rx="8" fill="#f2ede1"/>
  <rect x="1312" y="660" width="240" height="80" rx="8" fill="#ffffff" stroke="#0c0b0a" stroke-width="1"/>
  <rect x="1324" y="672" width="56" height="16" rx="2" fill="transparent" stroke="rgba(12,11,10,0.50)" stroke-width="0.8"/>
  <text x="1352" y="683" class="mono" font-size="9" letter-spacing="1.2" fill="rgba(12,11,10,0.50)" text-anchor="middle">STATE</text>
  <text x="1432" y="718" class="sans" font-size="20" font-weight="600" fill="#0c0b0a" text-anchor="middle">snapshotted</text>

  <!-- killed -->
  <rect x="588" y="800" width="256" height="80" rx="8" fill="#f2ede1"/>
  <rect x="588" y="800" width="256" height="80" rx="8" fill="#ffffff" stroke="#0c0b0a" stroke-width="1"/>
  <rect x="600" y="812" width="56" height="16" rx="2" fill="transparent" stroke="rgba(12,11,10,0.50)" stroke-width="0.8"/>
  <text x="628" y="823" class="mono" font-size="9" letter-spacing="1.2" fill="rgba(12,11,10,0.50)" text-anchor="middle">FINAL</text>
  <text x="716" y="858" class="sans" font-size="20" font-weight="600" fill="#0c0b0a" text-anchor="middle">killed</text>

  <!-- terminal dot -->
  <circle cx="916" cy="840" r="10" fill="#f2ede1" stroke="#0c0b0a" stroke-width="1.4"/>
  <circle cx="916" cy="840" r="4"  fill="#0c0b0a"/>

  <!-- arrow labels (masked) -->
  <rect x="316" y="528" width="40" height="20" rx="3" fill="#f2ede1"/>
  <text x="336" y="542" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="rgba(12,11,10,0.50)" text-anchor="middle">START</text>

  <rect x="464" y="528" width="68" height="20" rx="3" fill="#f2ede1"/>
  <text x="498" y="542" class="mono" font-size="10" font-weight="700" letter-spacing="1.4" fill="#d9763a" text-anchor="middle">RESUME</text>

  <rect x="868" y="448" width="60" height="20" rx="3" fill="#f2ede1"/>
  <text x="898" y="462" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="rgba(12,11,10,0.50)" text-anchor="middle">PAUSE</text>

  <rect x="868" y="498" width="80" height="20" rx="3" fill="#f2ede1"/>
  <text x="908" y="512" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="rgba(12,11,10,0.50)" text-anchor="middle">UNPAUSE</text>

  <rect x="868" y="608" width="48" height="20" rx="3" fill="#f2ede1"/>
  <text x="892" y="622" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="rgba(12,11,10,0.50)" text-anchor="middle">TTL</text>

  <rect x="1216" y="688" width="68" height="20" rx="3" fill="#f2ede1"/>
  <text x="1250" y="702" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="rgba(12,11,10,0.50)" text-anchor="middle">SAVE</text>

  <rect x="668" y="688" width="68" height="20" rx="3" fill="#f2ede1"/>
  <text x="702" y="702" class="mono" font-size="10" font-weight="600" letter-spacing="1.4" fill="rgba(12,11,10,0.50)" text-anchor="middle">KILL</text>

  <!-- LEGEND -->
  <line x1="80" y1="990" x2="1840" y2="990" stroke="rgba(12,11,10,0.14)" stroke-width="0.8"/>
  <text x="80" y="1018" class="mono" font-size="11" letter-spacing="2.8" fill="rgba(12,11,10,0.50)">LEGEND</text>

  <rect x="208" y="1006" width="20" height="14" rx="3" fill="rgba(217,118,58,0.10)" stroke="#d9763a" stroke-width="1"/>
  <text x="240" y="1018" class="mono" font-size="12" fill="#0c0b0a">Focal state · most time</text>

  <rect x="540" y="1006" width="20" height="14" rx="3" fill="#ffffff" stroke="#0c0b0a" stroke-width="1"/>
  <text x="572" y="1018" class="mono" font-size="12" fill="#0c0b0a">Transient / final state</text>

  <line x1="820"  y1="1014" x2="864"  y2="1014" stroke="#0c0b0a" stroke-width="1.2"/>
  <text x="876" y="1018" class="mono" font-size="12" fill="#0c0b0a">Required transition</text>

  <line x1="1100" y1="1014" x2="1144" y2="1014" stroke="#0c0b0a" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="1156" y="1018" class="mono" font-size="12" fill="#0c0b0a">Optional · resume / unpause</text>

  <line x1="1500" y1="1014" x2="1544" y2="1014" stroke="#d9763a" stroke-width="1.6"/>
  <text x="1556" y="1018" class="mono" font-size="12" fill="#0c0b0a">Primary entry · iii.trigger</text>
</svg>
