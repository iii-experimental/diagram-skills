  <h2 class="sec-h2">[ONE-SENTENCE INGEST CLAIM, ENDS WITH A PERIOD].</h2>
  <p class="sub">[Pipeline summary, two mono lines max.] Source: <code class="code-inline">[PIPELINE_FILE]</code>.</p>

  <div class="svg-wrap">

      <text x="680" y="224" font-family="JetBrains Mono, monospace" font-size="11" fill="var(--accent)" text-anchor="middle">[PAID PATH]</text>

      <rect x="860" y="140" width="180" height="40" fill="var(--bg)" stroke="var(--fg)" stroke-width="1.2"/>
