<!-- Content slide. The default. One assertion, supporting body. Use for ~60% of slides. -->
<section class="slide slide--content" data-slide="N">
  <span class="slide-eyebrow">[section · qualifier]</span>
  <h2 class="h2">[One-sentence assertion that ends with a period.]</h2>
  <p class="body">[Supporting paragraph. Two to four lines. Numbers carry the prose. No marketing words.]</p>
  <!-- Optional bullet list. Keep to four bullets max. -->
  <ul class="body" style="padding-left: 1.4em;">
    <li>[Bullet — concrete, with a number or a file:line].</li>
    <li>[Bullet].</li>
  </ul>
</section>
