<!-- Quote slide. One short pull quote, mono attribution. Use sparingly — at most 1–2 per deck.
     Never marketing testimonial. The quote is a thesis statement or a citable line, not praise. -->
<section class="slide slide--quote" data-slide="N" style="text-align: left;">
  <span class="slide-eyebrow">[section · quoted]</span>
  <blockquote style="margin: 0 0 32px; padding: 0; border: none;">
    <p class="display" style="font-size: clamp(36px, 6vw, 72px); font-weight: 500; max-width: 24ch; margin: 0;">[Pull quote, eight to fourteen words].</p>
  </blockquote>
  <p class="body mono" style="color: var(--fg-3); margin: 0;">— [ATTRIBUTION] · [SOURCE]</p>
</section>
