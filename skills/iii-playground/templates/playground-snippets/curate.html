<!--
  CURATE snippet · approve / reject / tag rows in a flat list. Keyboard-first.

  Export shape:
    - prompt: "Approved: <id>, <id>; Rejected: <id>; Tagged-X: <id>"
    - JSON:   { task, items: [{ id, status, tags: [string], note }] }
-->
<style>
  .curate { display: grid; gap: 10px; }
  .curate .row {
    display: grid;
    grid-template-columns: 80px minmax(0, 1fr) auto;
    gap: 12px;
    align-items: start;
    border: 1px solid var(--line);
    padding: 12px 14px;
    background: var(--bg);
  }
  .curate .row.approved { border-color: var(--signal); }
  .curate .row.rejected { border-color: var(--fg-3); opacity: 0.6; }
  .curate .row.focused  { outline: 2px solid var(--accent); outline-offset: 2px; }
  .curate .row .id {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--fg-3);
    padding-top: 2px;
  }
  .curate .row .body { font-size: 14px; line-height: 1.45; }
  .curate .row .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .curate .row .tag {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--fg-3);
    border: 1px solid var(--line-strong);
    padding: 2px 6px;
  }
  .curate .row .actions { display: flex; gap: 6px; }
  .curate .btn {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    background: transparent;
    color: var(--fg-2);
    border: 1px solid var(--line-strong);
    padding: 6px 10px;
    cursor: pointer;
  }
  .curate .btn:hover { color: var(--fg); }
  .curate .btn.active.approve { background: var(--signal); color: var(--bg); border-color: var(--signal); }
  .curate .btn.active.reject  { background: var(--fg-3); color: var(--bg); border-color: var(--fg-3); }
  .curate .keys {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    color: var(--fg-3);
    padding: 8px 0;
  }
  .curate .keys kbd {
    border: 1px solid var(--line-strong);
    padding: 1px 6px;
    margin-right: 4px;
  }
</style>

<section class="container curate" id="curate">
  <div class="keys"><kbd>j</kbd>/<kbd>k</kbd> next/prev · <kbd>a</kbd> approve · <kbd>r</kbd> reject · <kbd>t</kbd> tag</div>
  <!-- Rows rendered by JS from state.items -->
</section>
