<!--
  KANBAN snippet · drag-and-drop cards across N columns.
  Swap into <main> in templates/playground.html. Replace the tuner state + render in <script>.

  Export shape:
    - prompt: "Final ordering: <col>: <item>, <item>; <col>: …"
    - JSON:   { task, columns: [{ name, items: [{ id, title, rationale }] }] }
-->
<style>
  .kanban {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: clamp(12px, 1.6vw, 20px);
  }
  .kanban .col {
    border: 1px solid var(--line);
    background: var(--bg);
    display: flex; flex-direction: column;
    min-height: 320px;
  }
  .kanban .col.over { border-color: var(--accent); }
  .kanban .col-head {
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-3);
    display: flex; justify-content: space-between; align-items: center;
  }
  .kanban .col-head .count { color: var(--fg); font-variant-numeric: tabular-nums; }
  .kanban .col-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .kanban .card {
    border: 1px solid var(--line-strong);
    background: var(--bg-2);
    padding: 10px 12px;
    cursor: grab;
    user-select: none;
  }
  .kanban .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .kanban .card.dragging { opacity: 0.5; }
  .kanban .card .id {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    color: var(--fg-3);
    letter-spacing: 0.1em;
  }
  .kanban .card .title { font-size: 14px; line-height: 1.4; margin-top: 2px; }
  @media (max-width: 900px) { .kanban { grid-template-columns: repeat(2, 1fr); } }
</style>

<section class="container kanban" id="kanban">
  <!-- Column markup is rendered by JS from state.columns. -->
</section>
