<!--
  SPLIT-PREVIEW snippet · editable text on the left, live render on the right.
  Use for: prompt tuning, template editing, copy iteration, regex testing.

  Export shape:
    - prompt: the final edited string verbatim
    - JSON:   { task, source, rendered, variables: { … } }
-->
<style>
  .split {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: clamp(16px, 2vw, 28px);
    height: calc(100dvh - 320px);
    min-height: 480px;
  }
  .split .pane {
    border: 1px solid var(--line);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .split .pane-head {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-3);
    display: flex; justify-content: space-between; align-items: center;
  }
  .split .pane-head .meta { color: var(--fg); font-variant-numeric: tabular-nums; }
  .split .pane-body { flex: 1; min-height: 0; overflow: auto; }
  .split textarea {
    width: 100%; height: 100%;
    border: none; resize: none;
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    line-height: 1.55;
    padding: 14px;
  }
  .split textarea:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .split .preview-body {
    padding: 14px;
    font-family: 'Inter Tight', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .split .var { color: var(--accent); font-weight: 600; }
  @media (max-width: 900px) {
    .split { grid-template-columns: 1fr; height: auto; }
    .split .pane { min-height: 320px; }
  }
</style>

<section class="container split">
  <div class="pane">
    <div class="pane-head">
      <span>source</span>
      <span class="meta" id="src-meta">0 chars</span>
    </div>
    <div class="pane-body">
      <textarea id="src" spellcheck="false" placeholder="[Edit your prompt / template / copy here]"></textarea>
    </div>
  </div>
  <div class="pane">
    <div class="pane-head">
      <span>preview</span>
      <span class="meta" id="prev-meta">0 chars</span>
    </div>
    <div class="pane-body">
      <div class="preview-body" id="prev"></div>
    </div>
  </div>
</section>
