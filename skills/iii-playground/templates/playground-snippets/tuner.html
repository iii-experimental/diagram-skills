<!--
  TUNER snippet · sliders / number inputs / color pickers driving a live preview.
  This is the same pattern the scaffold ships with, broken out as a reusable snippet.

  Export shape:
    - prompt: "Use these values: <k>=<v>, …"
    - JSON:   { task, values: { k: v, … } }

  The scaffold (templates/playground.html) already implements a working tuner with three sliders.
  Use this snippet as the starting point if you want to swap or add controls; otherwise edit
  the scaffold directly.
-->
<style>
  .tuner-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: clamp(20px, 3vw, 40px);
    align-items: start;
  }
  .controls { display: grid; gap: 16px; border: 1px solid var(--line); padding: 20px; }
  .control { display: grid; grid-template-columns: 1fr auto; gap: 8px 16px; align-items: center; }
  .control label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-3);
  }
  .control .value { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; }
  .control input[type="range"] { grid-column: 1 / -1; width: 100%; accent-color: var(--accent); }
  .control input[type="number"], .control select, .control input[type="text"] {
    grid-column: 1 / -1;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    background: var(--bg-2);
    color: var(--fg);
    border: 1px solid var(--line);
    padding: 8px 10px;
  }
  .control input[type="color"] { grid-column: 2 / 3; width: 40px; height: 24px; border: 1px solid var(--line); padding: 0; }
  .control :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .preview { border: 1px solid var(--line); padding: 32px; min-height: 260px; display: flex; align-items: center; justify-content: center; }
  @media (max-width: 720px) { .tuner-grid { grid-template-columns: 1fr; } }
</style>

<section class="container tuner-grid">
  <div class="controls">
    <!-- Add one .control per parameter. Examples:
    <div class="control">
      <label for="duration">duration · ms</label>
      <span class="value" id="duration-value">240</span>
      <input type="range" id="duration" min="40" max="1200" value="240" step="20" />
    </div>
    <div class="control">
      <label for="ease">easing</label>
      <select id="ease">
        <option value="cubic-bezier(.2,.8,.2,1)">smooth (default)</option>
        <option value="cubic-bezier(.4,0,.2,1)">standard</option>
        <option value="cubic-bezier(.34,1.56,.64,1)">overshoot</option>
      </select>
    </div>
    <div class="control">
      <label for="color">color</label>
      <input type="color" id="color" value="#d9763a" />
    </div>
    -->
  </div>
  <div class="preview">
    <div class="preview-target" id="preview-target"></div>
  </div>
</section>
