<!-- Two-column slide. Side-by-side comparison along the binary axis (signal vs accent).
     Title on top. Two columns share the legend. -->
<section class="slide slide--two-column" data-slide="N">
  <span class="slide-eyebrow">[section · comparison]</span>
  <h2 class="h2" style="font-size: clamp(28px, 4vw, 48px); margin-bottom: 32px;">[Comparison title that ends with a period.]</h2>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: clamp(24px, 4vw, 64px); flex: 1; min-height: 0;">
    <div style="border-left: 3px solid var(--signal); padding-left: 24px;">
      <div class="mono" style="font-size: 12px; color: var(--signal); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 12px;">[FREE PATH]</div>
      <h3 style="font-size: clamp(22px, 2.4vw, 32px); margin: 0 0 16px; font-weight: 600;">[Left side claim.]</h3>
      <ul class="body" style="padding-left: 1.4em; margin: 0;">
        <li>[Concrete bullet with a number or file:line].</li>
        <li>[Bullet].</li>
        <li>[Bullet].</li>
      </ul>
    </div>
    <div style="border-left: 3px solid var(--accent); padding-left: 24px;">
      <div class="mono" style="font-size: 12px; color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 12px;">[PAID PATH]</div>
      <h3 style="font-size: clamp(22px, 2.4vw, 32px); margin: 0 0 16px; font-weight: 600;">[Right side claim.]</h3>
      <ul class="body" style="padding-left: 1.4em; margin: 0;">
        <li>[Concrete bullet with a number or file:line].</li>
        <li>[Bullet].</li>
        <li>[Bullet].</li>
      </ul>
    </div>
  </div>
</section>
